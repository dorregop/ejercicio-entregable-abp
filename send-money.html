<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Enviar Dinero</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
    <script defer src="./assets/js/send-money.js"></script>
</head>

<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
                aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="./index.html">Inicio</a>
                    <a class="nav-link" href="./deposit.html">Deposito</a>
                    <a class="nav-link nav-link active" href="./send-money.html">Enviar Dinero</a>
                    <a class="nav-link" href="./transactions.html">Transacciones</a>
                    <a class="nav-link" href="./login.html">Login</a>
                </div>
            </div>
        </div>
    </nav>
    <header>
        <h1 class="text-center mt-5 text-primary">Enviar Dinero</h1>
    </header>
    <main class="container py-4">
        <section>
            <div class="row justify-content-center">
                <div class="col-12 col-md-8 col-lg-6">
                    <p class="fs-3 fw-bold">Balance de la cuenta: $ <span id="balance">60.000</span></p>
                    <form id="formSendMoney">
                        <div class="mb-3">
                            <label for="buscarContacto" class="form-label">Buscar en la agenda de transferencias</label>
                            <input type="text" class="form-control" name="buscarContacto" id="buscarContacto"
                                placeholder="Buscar contacto">
                        </div>
                        <div class="mb-3">
                            <button class="btn btn-primary" id="btn-agregar-contacto">Agregar nuevo contacto</button>
                        </div>
                        <div class="mb-3">
                            <h2 class="fs-1">Contactos</h2>
                            <ul class="list-group" id="listaContactos">
                            </ul>
                        </div>
                        <div class="mb-3">
                            <label for="monto" class="form-label">Monto a transferir:</label>
                            <input type="number" class="form-control" min="1"
                                placeholder="Ingrese el monto a transferir" id="monto" name="monto" required>
                        </div>
                        <div class="mb-3">
                            <input type="submit" value="Enviar dinero" class="btn btn-primary">
                        </div>
                    </form>
                </div>
            </div>
        </section>
    </main>
</body>

</html>
