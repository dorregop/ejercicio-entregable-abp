<body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container">
            <a class="navbar-brand" href="./index.html">Alky-Wallet</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"

    <header class="pt-5 pb-2">

    <div class="container">
        <section class="row justify-content-center">
            <div class="col-12 col-sm-10 col-md-8 col-lg-6">
                <form>
                    <p>Buscar destinatario:</p>
                    <input type="text" class="form-control mb-3"
                        placeholder="Ingrese el nombre del destinatario">
                    <button class="btn btn-primary mb-4">Agregar nuevo Contacto</button>
                    <h3>Contactos:</h3>
                    <ul id="contactList" class="list-group">
                        <li class="list-group-item list-group-item-action list-group-item-light">
                            <div class="contact-info">
                                <span class="contact-name">John Doe</span>
                                <p class="contact-details">CBU: 123456789, Alias: john.doe, Banco: ABC Bank</p>
                            </div>
                        </li>
                        <li class="list-group-item list-group-item-action list-group-item-light">
                            <div class="contact-info">
                                <span class="contact-name">Jane Smith</span>
                                <p class="contact-details">CBU: 987654321, Alias: jane.smith, Banco: XYZ Bank</p>
                            </div>
                        </li>
                    </ul>
                    <div class="mt-3 d-flex flex-column align-items-center">

                    </div>
                </form>
            </div>
